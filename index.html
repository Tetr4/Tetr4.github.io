<html>
<head>
<title>Three.js</title>
<style>
body {
    margin: 0;
}
canvas {
    width: 100%; height: 100%
}
</style>
</head>
<body>
<script src="js/three.min.js"></script>
<script src="js/OBJLoader.js"></script>
<script>

    var loader = new THREE.OBJLoader(); // create models from .obj files
    var renderer = new THREE.WebGLRenderer();
    renderer.setSize( window.innerWidth, window.innerHeight );
    document.body.appendChild( renderer.domElement );

    var scene = new THREE.Scene();
    var camera = new THREE.PerspectiveCamera( 75, window.innerWidth/window.innerHeight, 0.1, 1000 );
    camera.position.z = 5;



    // light
    var ambient = new THREE.AmbientLight( 0x444444 );
    scene.add( ambient );
    var directionalLight = new THREE.DirectionalLight( 0xffeedd );
    directionalLight.position.set( 0, 0, 1 );
    scene.add( directionalLight );

    // cube
    var geometry = new THREE.BoxGeometry( 1, 1, 1 );
    var material = new THREE.MeshBasicMaterial( { color: 0x3040A0, wireframe:false  });
    var cube = new THREE.Mesh( geometry, material );
    scene.add( cube );

    // teapot
    var teapot;
    loader.load( 'wt_teapot.obj', function ( object ) {
        teapot = object;
        scene.add( teapot );
    });


    var animate = function(time) {
        if(teapot) { // animate only when model is fully loaded
            var i = time * 0.001; // time in seconds
            i%=Math.PI*2; // limit to range (0, 2*PI)
            var sin = 1 + Math.sin(i) + 0.5;
            var cos = 1 + Math.cos(i) + 0.5;

            teapot.position.x = (cos - Math.PI/2) * -3;
            teapot.position.z = (sin - Math.PI/2);

            teapot.rotation.x = i;
            teapot.rotation.y = i;
        }

        if(cube) {
            var j = time * 0.001 * 9;
            var scale = 1 + Math.sin(j)/2 * 0.25;
            cube.scale.set(scale,scale,scale);

            var k = time * 0.001 * 2;
            k%=Math.PI*2; // limit to range (0, 2*PI)
            if(k <= Math.PI) {
                cube.rotation.z = k;
            } else {
                cube.rotation.x = k;
            }
        }
    }


    var renderloop = function() {
        requestAnimationFrame( renderloop );

        var now = new Date().getTime();
        animate(now);

        renderer.render(scene, camera);
    }

    // start rendering
    renderloop();

</script>
</body>
</html>
